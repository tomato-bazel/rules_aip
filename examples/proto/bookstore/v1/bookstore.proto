syntax = "proto3";

// Idiomatic AIP (https://aip.dev) service — the canonical bookstore. Passes
// api-linter clean and doubles as the copy-paste template for new services.
//
// Layout note: the file lives at `bookstore/v1/bookstore.proto` (via
// strip_import_prefix in BUILD) so the path matches `package bookstore.v1`,
// satisfying AIP-191 without disabling any rule.
package bookstore.v1;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";

option java_multiple_files = true;
option java_package = "com.fastverk.bookstore.v1";
option java_outer_classname = "BookstoreProto";

// Manages books in a publisher's catalog.
service Bookstore {
  option (google.api.default_host) = "bookstore.fastverk.dev";

  // Gets a book. (AIP-131)
  rpc GetBook(GetBookRequest) returns (Book) {
    option (google.api.http) = {get: "/v1/{name=publishers/*/books/*}"};
    option (google.api.method_signature) = "name";
  }

  // Lists books under a publisher. (AIP-132)
  rpc ListBooks(ListBooksRequest) returns (ListBooksResponse) {
    option (google.api.http) = {get: "/v1/{parent=publishers/*}/books"};
    option (google.api.method_signature) = "parent";
  }

  // Creates a book. (AIP-133)
  rpc CreateBook(CreateBookRequest) returns (Book) {
    option (google.api.http) = {
      post: "/v1/{parent=publishers/*}/books"
      body: "book"
    };
    option (google.api.method_signature) = "parent,book";
  }
}

// A book in the catalog. (AIP-123)
message Book {
  option (google.api.resource) = {
    type: "bookstore.fastverk.dev/Book"
    pattern: "publishers/{publisher}/books/{book}"
    singular: "book"
    plural: "books"
  };

  // Identifier. The resource name of the book.
  // Format: `publishers/{publisher}/books/{book}`
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // The title of the book.
  string title = 2 [(google.api.field_behavior) = REQUIRED];

  // The author of the book.
  string author = 3 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for `GetBook`. (AIP-131)
message GetBookRequest {
  // The name of the book to retrieve.
  // Format: `publishers/{publisher}/books/{book}`
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "bookstore.fastverk.dev/Book"}
  ];
}

// Request message for `ListBooks`. (AIP-132)
message ListBooksRequest {
  // The publisher to list books from.
  // Format: `publishers/{publisher}`
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "bookstore.fastverk.dev/Book"}
  ];

  // The maximum number of books to return. The service may return fewer.
  int32 page_size = 2 [(google.api.field_behavior) = OPTIONAL];

  // A page token from a previous `ListBooks` call.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];
}

// Response message for `ListBooks`. (AIP-132)
message ListBooksResponse {
  // The books.
  repeated Book books = 1;

  // A token to retrieve the next page, or empty if there are no more.
  string next_page_token = 2;
}

// Request message for `CreateBook`. (AIP-133)
message CreateBookRequest {
  // The publisher to create the book under.
  // Format: `publishers/{publisher}`
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "bookstore.fastverk.dev/Book"}
  ];

  // The book to create.
  Book book = 2 [(google.api.field_behavior) = REQUIRED];

  // The ID to use for the book, which becomes the final component of `name`.
  string book_id = 3 [(google.api.field_behavior) = OPTIONAL];
}
